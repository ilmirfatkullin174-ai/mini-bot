<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шинторг - заявка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f2b3d 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            padding: 16px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 32px 24px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.25);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #1e2a3a;
        }
        .sub {
            color: #5a6874;
            margin-bottom: 28px;
            border-left: 3px solid #ff8c00;
            padding-left: 12px;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            outline: none;
            margin-bottom: 16px;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: #ff8c00;
        }
        button {
            background: #1e2a3a;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }
        button:active {
            background: #ff8c00;
            transform: scale(0.98);
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 16px;
            border-radius: 28px;
            text-align: center;
            margin-top: 20px;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 28px;
            text-align: center;
            margin-top: 20px;
        }
        hr {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: #e2e8f0;
        }
        .note {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
        }
        @media (max-width: 480px) {
            .card { padding: 24px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🚛 Шинторг</h1>
    <div class="sub">Оставьте заявку — мы подберём шины</div>

    <select id="type">
        <option value="">👉 Тип шин</option>
        <option>🚗 Легковая</option>
        <option>🚛 Грузовая</option>
        <option>🏗️ Спецшина</option>
    </select>

    <div id="seasonBlock" style="display: none;">
        <select id="season">
            <option value="">👉 Сезон</option>
            <option>☀️ Лето</option>
            <option>❄️ Зима</option>
            <option>🍂 Всесезон</option>
        </select>
    </div>

    <input type="text" id="size" placeholder="📏 Размер (например, 205/55 R16)">
    <input type="text" id="brand" placeholder="🏷️ Бренд (можно 'любой')">
    <input type="text" id="city" placeholder="📍 Ваш город">
    <input type="tel" id="phone" placeholder="📞 Номер телефона">

    <button id="sendBtn">📩 Отправить заявку</button>
    <div id="result"></div>
    <div class="note">Нажимая «Отправить», вы соглашаетесь на обработку данных</div>
</div>

<script>
    // Показываем/скрываем сезон в зависимости от типа
    const typeSelect = document.getElementById('type');
    const seasonBlock = document.getElementById('seasonBlock');

    typeSelect.addEventListener('change', function() {
        if (this.value === '🚗 Легковая') {
            seasonBlock.style.display = 'block';
        } else {
            seasonBlock.style.display = 'none';
        }
    });

    // Отправка заявки
    document.getElementById('sendBtn').addEventListener('click', function() {
        const type = document.getElementById('type').value;
        const season = document.getElementById('season')?.value || '';
        const size = document.getElementById('size').value.trim();
        const brand = document.getElementById('brand').value.trim();
        const city = document.getElementById('city').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const resultDiv = document.getElementById('result');

        // Проверка заполнения
        if (!type) {
            resultDiv.innerHTML = '<div class="error">❌ Выберите тип шин</div>';
            return;
        }
        if (type === '🚗 Легковая' && !season) {
            resultDiv.innerHTML = '<div class="error">❌ Выберите сезон для легковых шин</div>';
            return;
        }
        if (!size) {
            resultDiv.innerHTML = '<div class="error">❌ Введите размер шин</div>';
            return;
        }
        if (!brand) {
            resultDiv.innerHTML = '<div class="error">❌ Введите бренд</div>';
            return;
        }
        if (!city) {
            resultDiv.innerHTML = '<div class="error">❌ Введите ваш город</div>';
            return;
        }
        if (!phone || phone.length < 5) {
            resultDiv.innerHTML = '<div class="error">❌ Введите корректный номер телефона</div>';
            return;
        }

        // Текст заявки
        const message = `НОВАЯ ЗАЯВКА НА ШИНЫ\n\nТип: ${type}\nСезон: ${season || 'не указан'}\nРазмер: ${size}\nБренд: ${brand}\nГород: ${city}\nТелефон: ${phone}`;

        // Отправка через Telegram бота (работает всегда)
        const BOT_TOKEN = '8171108689:AAH6Yt6RMo9zZ8qYMP3kh_7lWZ7yEgK3FqI';
        const CHAT_ID = '963751517';

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message })
        })
        .then(response => response.json())
        .then(data => {
            if (data.ok) {
                resultDiv.innerHTML = '<div class="success">✅ Заявка отправлена! Мы свяжемся с вами</div>';
                // Очищаем форму
                document.getElementById('type').value = '';
                document.getElementById('season').value = '';
                document.getElementById('size').value = '';
                document.getElementById('brand').value = '';
                document.getElementById('city').value = '';
                document.getElementById('phone').value = '';
                seasonBlock.style.display = 'none';
            } else {
                resultDiv.innerHTML = '<div class="error">❌ Ошибка отправки. Попробуйте позже</div>';
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            resultDiv.innerHTML = '<div class="error">❌ Ошибка отправки. Попробуйте позже</div>';
        });
    });
</script>
</body>
</html>
