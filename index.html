<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шинторг - заявка</title>
    <style>
        body {
            background: #0f2b3d;
            font-family: system-ui;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 25px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #1e2a3a;
        }
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 50px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ff8c00;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🚛 Заявка на шины</h1>

    <select id="type">
        <option value="">Тип шин</option>
        <option>🚗 Легковая</option>
        <option>🚛 Грузовая</option>
        <option>🏗️ Спецшина</option>
    </select>

    <select id="season">
        <option value="">Сезон (для легковых)</option>
        <option>☀️ Лето</option>
        <option>❄️ Зима</option>
        <option>🍂 Всесезон</option>
    </select>

    <input type="text" id="size" placeholder="Размер (205/55 R16)">
    <input type="text" id="brand" placeholder="Бренд">
    <input type="text" id="city" placeholder="Город">
    <input type="tel" id="phone" placeholder="Телефон">

    <button id="sendBtn">📩 Отправить заявку</button>
    <div id="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
    const PUBLIC_KEY = 'tAKHA2aayPczXoZdt';
    const SERVICE_ID = 'service_8cmb02c';
    const TEMPLATE_ID = 'template_vy8p6wi';

    emailjs.init(PUBLIC_KEY);

    document.getElementById('sendBtn').onclick = function() {
        const type = document.getElementById('type').value;
        const season = document.getElementById('season').value;
        const size = document.getElementById('size').value;
        const brand = document.getElementById('brand').value;
        const city = document.getElementById('city').value;
        const phone = document.getElementById('phone').value;

        if (!type || !size || !brand || !city || !phone) {
            document.getElementById('result').innerHTML = '<div class="success" style="background:#ffe0e0;color:#c00;">❌ Заполните все поля</div>';
            return;
        }

        const message = `Тип: ${type}\nСезон: ${season || 'не указан'}\nРазмер: ${size}\nБренд: ${brand}\nГород: ${city}\nТелефон: ${phone}`;

        emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            type: type,
            season: season || 'не указан',
            size: size,
            brand: brand,
            city: city,
            phone: phone,
            message: message
        }).then(function() {
            document.getElementById('result').innerHTML = '<div class="success">✅ Заявка отправлена!</div>';
            document.getElementById('type').value = '';
            document.getElementById('season').value = '';
            document.getElementById('size').value = '';
            document.getElementById('brand').value = '';
            document.getElementById('city').value = '';
            document.getElementById('phone').value = '';
        }).catch(function(error) {
            document.getElementById('result').innerHTML = '<div class="success" style="background:#ffe0e0;color:#c00;">❌ Ошибка: ' + error.text + '</div>';
        });
    };
</script>
</body>
</html>
