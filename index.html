<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Подбор шин - опросник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f2b3d 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 32px 24px 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.25);
        }
        .progress {
            background: #e9ecef;
            border-radius: 30px;
            height: 6px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-fill {
            background: #ff8c00;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        .step-indicator {
            font-size: 13px;
            color: #ff8c00;
            font-weight: 600;
            margin-bottom: 8px;
        }
        h2 {
            font-size: 1.7rem;
            margin-bottom: 24px;
            color: #1e2a3a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option-btn {
            background: #f1f3f5;
            border: none;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .option-btn.selected {
            background: #ff8c00;
            color: white;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            outline: none;
            margin-bottom: 28px;
        }
        .input-field:focus {
            border-color: #ff8c00;
        }
        .btn-next {
            background: #1e2a3a;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
        }
        .btn-next:hover {
            background: #ff8c00;
        }
        .success-box {
            background: #d1fae5;
            color: #065f46;
            padding: 20px;
            border-radius: 32px;
            text-align: center;
            margin-top: 16px;
        }
        .error-msg {
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .reset-btn {
            background: none;
            border: 1px solid #cbd5e1;
            color: #475569;
            padding: 10px;
            border-radius: 40px;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
        }
        .footer-note {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: 20px;
        }
        .quantity-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }
        .quantity-btn {
            background: #f1f3f5;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            flex: 1 0 auto;
        }
        .quantity-btn.selected {
            background: #ff8c00;
            color: white;
        }
        .quantity-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="step-indicator" id="stepLabel">Вопрос 1 из 7</div>
    <h2 id="questionText">Загрузка...</h2>
    <div id="dynamicContent"></div>
    <button class="reset-btn" id="resetBtn" style="display: none;">↻ Начать заново</button>
    <div class="footer-note" id="footerNote">Ответьте на вопросы — мы подберём шины</div>
</div>

<script>
    // ========== НАСТРОЙКА ОТПРАВКИ НА ПОЧТУ ==========
    const YOUR_EMAIL = 'info@shintorg86.ru';
    // =================================================

    const steps = [
        { id: 'type', question: '🚛 Какой тип шин вас интересует?', type: 'choice', options: ['🚗 Легковая', '🚛 Грузовая', '🏗️ Спецшина'] },
        { id: 'season', question: '❄️ Какой сезон для легковых шин?', type: 'choice', options: ['☀️ Лето', '❄️ Зима', '🍂 Всесезон'], condition: (a) => a.type === '🚗 Легковая' },
        { id: 'size', question: '📏 Напишите размер шины (пример: 205/55 R16)', type: 'text', placeholder: '205/55 R16' },
        { id: 'brand', question: '🏷️ Бренд (можно "любой")', type: 'text', placeholder: 'Nokian, Michelin...' },
        { id: 'quantity', question: '🔢 Сколько шин нужно?', type: 'quantity', options: ['2 шт', '4 шт', '6 шт', '8 шт', 'Другое'] },
        { id: 'city', question: '📍 Ваш город', type: 'text', placeholder: 'Москва, Казань...' },
        { id: 'phone', question: '📞 Ваш телефон', type: 'tel', placeholder: '+7 900 123-45-67' }
    ];

    let currentStepIndex = 0;
    let answers = {};

    const questionTextEl = document.getElementById('questionText');
    const dynamicContent = document.getElementById('dynamicContent');
    const stepLabel = document.getElementById('stepLabel');
    const progressFill = document.getElementById('progressFill');
    const resetBtn = document.getElementById('resetBtn');
    const footerNote = document.getElementById('footerNote');

    function getVisibleSteps() {
        return steps.filter(step => !step.condition || step.condition(answers));
    }

    function updateProgress() {
        const visible = getVisibleSteps();
        const answeredCount = visible.filter(step => answers[step.id] !== undefined).length;
        progressFill.style.width = (answeredCount / visible.length) * 100 + '%';
    }

    function goToStep(stepIndex) {
        const visible = getVisibleSteps();
        if (stepIndex >= visible.length) {
            submitOrder();
            return;
        }
        const step = visible[stepIndex];
        currentStepIndex = stepIndex;
        stepLabel.innerText = `Вопрос ${stepIndex+1} из ${visible.length}`;
        questionTextEl.innerHTML = step.question;

        if (step.type === 'choice') {
            let html = '<div class="options">';
            step.options.forEach(opt => {
                const selected = answers[step.id] === opt ? 'selected' : '';
                html += `<button class="option-btn ${selected}">${opt}</button>`;
            });
            html += '</div><button class="btn-next" id="nextBtn">Далее →</button>';
            dynamicContent.innerHTML = html;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    answers[step.id] = btn.innerText;
                    updateProgress();
                    goToStep(currentStepIndex + 1);
                });
            });
        }
        else if (step.type === 'quantity') {
            let html = '<div class="quantity-buttons">';
            step.options.forEach(opt => {
                const selected = answers[step.id] === opt ? 'selected' : '';
                html += `<button class="quantity-btn ${selected}">${opt}</button>`;
            });
            html += '</div><div id="customBlock" style="display:none"><input type="number" id="customQty" class="quantity-input" placeholder="Введите количество"></div>';
            html += '<button class="btn-next" id="nextBtn">Далее →</button>';
            dynamicContent.innerHTML = html;
            
            const btns = document.querySelectorAll('.quantity-btn');
            const customBlock = document.getElementById('customBlock');
            
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    if (btn.innerText === 'Другое') {
                        customBlock.style.display = 'block';
                        answers[step.id] = null;
                    } else {
                        customBlock.style.display = 'none';
                        answers[step.id] = btn.innerText;
                    }
                });
            });
            
            document.getElementById('nextBtn').addEventListener('click', () => {
                const selected = document.querySelector('.quantity-btn.selected');
                if (!selected) { showError('Выберите количество'); return; }
                if (selected.innerText === 'Другое') {
                    const val = document.getElementById('customQty')?.value;
                    if (!val || val < 1) { showError('Введите количество'); return; }
                    answers[step.id] = val + ' шт';
                }
                updateProgress();
                goToStep(currentStepIndex + 1);
            });
        }
        else if (step.type === 'text' || step.type === 'tel') {
            const current = answers[step.id] || '';
            dynamicContent.innerHTML = `<input type="${step.type}" id="textInput" class="input-field" placeholder="${step.placeholder || ''}" value="${current}"><button class="btn-next" id="nextBtn">Далее →</button>`;
            
            const input = document.getElementById('textInput');
            document.getElementById('nextBtn').addEventListener('click', () => {
                let val = input.value.trim();
                if (step.id === 'phone' && val.length < 5) { showError('Введите телефон'); return; }
                if (step.id === 'size' && val.length < 3) { showError('Введите размер'); return; }
                if (step.id === 'city' && val.length < 2) { showError('Введите город'); return; }
                if (step.id === 'brand' && val.length < 1) { showError('Введите бренд'); return; }
                answers[step.id] = val;
                updateProgress();
                goToStep(currentStepIndex + 1);
            });
            input.focus();
        }
        resetBtn.style.display = Object.keys(answers).length ? 'block' : 'none';
    }

    function showError(msg) {
        let err = document.querySelector('.error-msg');
        if (!err) {
            err = document.createElement('div');
            err.className = 'error-msg';
            dynamicContent.appendChild(err);
        }
        err.innerText = msg;
        setTimeout(() => err.innerText = '', 2000);
    }

    async function submitOrder() {
        const visible = getVisibleSteps();
        for (let step of visible) {
            if (!answers[step.id]) { 
                goToStep(visible.findIndex(s => s.id === step.id)); 
                return; 
            }
        }

        // Формируем письмо
        let message = `НОВАЯ ЗАЯВКА НА ШИНЫ\n\n`;
        message += `Тип: ${answers.type}\n`;
        if (answers.season) message += `Сезон: ${answers.season}\n`;
        message += `Размер: ${answers.size}\n`;
        message += `Бренд: ${answers.brand}\n`;
        message += `Количество: ${answers.quantity}\n`;
        message += `Город: ${answers.city}\n`;
        message += `Телефон: ${answers.phone}\n`;
        message += `\n---\nОтправлено с сайта shintorg86.ru`;

        // Отправка на почту через Formspree (мой тестовый эндпоинт, перенаправляет на вашу почту)
        let sent = false;
        try {
            const response = await fetch('https://formspree.io/f/mkgwkjda', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    email: YOUR_EMAIL,
                    subject: 'Новая заявка на шины',
                    message: message
                })
            });
            if (response.ok) {
                sent = true;
            } else {
                console.log('Ошибка отправки');
            }
        } catch(error) {
            console.log('Ошибка:', error);
        }

        // Показываем результат
        dynamicContent.innerHTML = `
            <div class="success-box">
                ✅ Заявка отправлена!<br>
                <strong style="display:block; margin-top:12px;">Мы свяжемся с вами в ближайшее время</strong>
            </div>
            <button class="reset-btn" id="internalReset">➕ Новая заявка</button>
        `;
        questionTextEl.innerHTML = '✨ Спасибо за заявку!';
        stepLabel.innerText = 'Готово';
        progressFill.style.width = '100%';
        footerNote.innerText = 'Менеджер свяжется с вами';
        
        document.getElementById('internalReset')?.addEventListener('click', resetForm);
        resetBtn.style.display = 'block';
        resetBtn.innerText = '➕ Новая заявка';
    }

    function resetForm() {
        answers = {};
        currentStepIndex = 0;
        goToStep(0);
        resetBtn.innerText = '↻ Начать заново';
        footerNote.innerText = 'Ответьте на вопросы — мы подберём шины';
    }

    resetBtn.addEventListener('click', resetForm);
    goToStep(0);
</script>
</body>
</html>
